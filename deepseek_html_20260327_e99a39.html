<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tebe Story Maker v15 | Novel Studio</title>
  <!-- Tailwind CSS + Fonts + Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0d0d0d] text-gray-200 font-crimson">

<div class="flex h-screen w-full overflow-hidden">
  <!-- SIDEBAR KIRI (320px fixed, scroll independen) -->
  <aside class="w-[320px] flex-shrink-0 sidebar flex flex-col overflow-y-auto p-5 gap-5">
    <!-- Judul Aplikasi -->
    <div class="border-b border-[#c5a059]/30 pb-3">
      <h1 class="text-2xl font-cinzel font-bold text-[#c5a059] tracking-wide">TEBE STORY MAKER</h1>
      <p class="text-xs text-gray-400 mt-1">v15 · professional novel studio</p>
    </div>

    <!-- API Key + Model -->
    <div class="space-y-3">
      <label class="block text-xs uppercase tracking-wider text-gray-400 font-semibold">🔑 Gemini API Key</label>
      <input type="password" id="apiKeyInput" placeholder="Masukkan API Key" class="w-full p-2 rounded text-sm">
      <button id="connectModelsBtn" class="w-full btn-outline-gold rounded py-2 text-sm font-medium"><i class="fas fa-plug mr-1"></i> Connect & Ambil Model</button>
      
      <label class="block text-xs uppercase tracking-wider text-gray-400 font-semibold mt-2">🤖 Model AI</label>
      <select id="modelSelect" class="w-full p-2 rounded text-sm bg-[#1a1a1a]">
        <option value="">-- Belum terhubung --</option>
      </select>
    </div>

    <!-- Konsep Novel -->
    <div class="space-y-3 border-t border-gray-800 pt-4">
      <h3 class="font-cinzel text-[#c5a059] font-semibold">📖 KONSEP NOVEL</h3>
      <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-2 rounded text-sm">
      <input type="text" id="novelGenre" placeholder="Genre (ex: Dark Fantasy, Thriller)" class="w-full p-2 rounded text-sm">
      <input type="text" id="novelStyle" placeholder="Gaya Penulisan (ex: Gothic, Cinematic)" class="w-full p-2 rounded text-sm">
      <textarea id="novelIdea" rows="3" placeholder="Ide cerita utama, sinopsis, atau premise..." class="w-full p-2 rounded text-sm resize-none"></textarea>
    </div>

    <!-- Tombol Aksi Utama & Ekspor Full -->
    <div class="space-y-2 pt-2">
      <button id="newChapterBtn" class="w-full btn-gold rounded py-2.5 font-bold text-sm shadow-lg"><i class="fas fa-feather-alt mr-2"></i> + TULIS BAB BARU</button>
      <div class="grid grid-cols-2 gap-2">
        <button id="exportFullTxtBtn" class="btn-outline-gold rounded py-2 text-sm"><i class="fas fa-file-alt"></i> TXT Full</button>
        <button id="exportFullHtmlBtn" class="btn-outline-gold rounded py-2 text-sm"><i class="fab fa-html5"></i> HTML Full</button>
      </div>
      <div class="text-[10px] text-gray-500 text-center mt-1">Auto-save aktif ✨</div>
    </div>
  </aside>

  <!-- WORKSPACE KANAN: daftar bab (chapter cards) -->
  <main class="flex-1 overflow-y-auto p-6 bg-[#0d0d0d]">
    <div class="flex justify-between items-center mb-5 flex-wrap gap-2">
      <h2 class="text-2xl font-cinzel text-[#c5a059]"><i class="fas fa-book-open mr-2"></i>Bab-bab Novel</h2>
      <span id="chapterCountBadge" class="bg-[#1e1e1e] text-[#c5a059] px-3 py-1 rounded-full text-sm">0 bab</span>
    </div>
    <div id="chaptersContainer" class="space-y-6">
      <!-- dynamic chapter cards akan di-render di sini -->
      <div class="text-center text-gray-500 py-20 italic">Belum ada bab. Klik "TULIS BAB BARU" untuk memulai masterpiece Anda.</div>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
