<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Pro - OpenRouter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 280px); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen">

    <header class="bg-white shadow-sm p-4 border-b">
        <div class="max-w-5xl mx-auto space-y-3">
            <div class="flex justify-between items-center">
                <h1 class="font-bold text-xl text-indigo-600">Gemini-Router Pro</h1>
                <div id="apiStatus" class="text-xs font-medium text-slate-500 flex items-center gap-2">
                    <span id="statusDot" class="status-dot bg-slate-300"></span>
                    <span id="statusText">Belum Dicek</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="flex gap-2 col-span-1 md:col-span-2">
                    <input type="password" id="apiKey" placeholder="Masukkan OpenRouter API Key" 
                           class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                    <button onclick="checkApiKey()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-600 transition">
                        Cek API
                    </button>
                </div>

                <select id="modelSelect" class="border rounded-lg px-3 py-2 text-sm bg-white focus:outline-indigo-500">
                    <option value="google/gemini-2.0-flash-001">Memuat model...</option>
                </select>
            </div>
        </div>
    </header>

    <main id="chatBox" class="max-w-5xl w-full mx-auto flex-1 overflow-y-auto p-4 space-y-4 chat-container">
        </main>

    <footer class="bg-white border-t p-4">
        <div class="max-w-5xl mx-auto flex flex-col gap-2">
            <div class="flex gap-2">
                <textarea id="userInput" rows="2" placeholder="Tulis pesan..." 
                          class="flex-1 border rounded-xl px-4 py-3 focus:outline-indigo-500 resize-none shadow-sm"></textarea>
                <button onclick="sendMessage()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-indigo-700 transition self-end">
                    Kirim
                </button>
            </div>
            <div class="flex justify-between px-1">
                <button onclick="clearChat()" class="text-xs text-red-500 hover:underline">Hapus Riwayat Chat</button>
                <span class="text-[10px] text-slate-400">Powered by OpenRouter</span>
            </div>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('modelSelect');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        // 1. Inisialisasi Data
        window.onload = async () => {
            const savedKey = localStorage.getItem('openrouter_key');
            if(savedKey) {
                apiKeyInput.value = savedKey;
                await fetchModels(); // Ambil daftar model saat start
                checkApiKey(); // Cek status key
            } else {
                fetchModels(); // Tetap ambil model meskipun key belum ada (beberapa list publik)
            }

            if(localStorage.getItem('chat_history')) {
                chatBox.innerHTML = localStorage.getItem('chat_history');
                scrollToBottom();
            }
        };

        // 2. Fungsi Cek API Key (Status Koneksi)
        async function checkApiKey() {
            const key = apiKeyInput.value.trim();
            if (!key) return alert("Masukkan API Key dulu!");

            statusText.innerText = "Mengecek...";
            statusDot.className = "status-dot bg-yellow-400 animation-pulse";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/key", {
                    method: "GET",
                    headers: { "Authorization": `Bearer ${key}` }
                });

                const result = await response.json();

                if (response.ok) {
                    const limit = result.data.limit_remaining !== null ? `$${result.data.limit_remaining.toFixed(4)}` : "Unlimited";
                    statusText.innerText = `Terkoneksi (Sisa: ${limit})`;
                    statusDot.className = "status-dot bg-emerald-500";
                    localStorage.setItem('openrouter_key', key);
                } else {
                    throw new Error();
                }
            } catch (err) {
                statusText.innerText = "Key Tidak Valid / Error";
                statusDot.className = "status-dot bg-red-500";
            }
        }

        // 3. Ambil Daftar Model dari API
        async function fetchModels() {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/models");
                const result = await response.json();
                
                modelSelect.innerHTML = ''; // Clear loading
                
                // Filter model agar yang populer/gratis muncul di atas (opsional)
                result.data.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.innerText = `${model.name} (${model.context_length / 1000}k)`;
                    modelSelect.appendChild(option);
                });

                // Set default jika ada
                modelSelect.value = "google/gemini-2.0-flash-001";
            } catch (err) {
                modelSelect.innerHTML = '<option>Gagal memuat daftar model</option>';
            }
        }

        // 4. Fungsi Kirim Pesan
        async function sendMessage() {
            const key = apiKeyInput.value.trim();
            const text = userInput.value.trim();
            const model = modelSelect.value;

            if (!key) return alert("API Key wajib diisi!");
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            const loadingId = appendMessage('bot', 'AI sedang memproses...');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [{ "role": "user", "content": text }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0]?.message?.content || "Tidak ada respon dari AI.";

                document.getElementById(loadingId).remove();
                appendMessage('bot', aiResponse);

            } catch (error) {
                document.getElementById(loadingId).innerText = "Error: Pastikan API Key benar dan memiliki saldo.";
            }
        }

        // Fungsi Pendukung (UI)
        function appendMessage(role, text) {
            const id = 'msg-' + Date.now();
            const isUser = role === 'user';
            const html = `
                <div id="${id}" class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-3 rounded-2xl ${isUser ? 'bg-indigo-600 text-white' : 'bg-white border text-slate-800 shadow-sm'}">
                        <p class="whitespace-pre-wrap text-sm">${text}</p>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            saveChat();
            scrollToBottom();
            return id;
        }

        function saveChat() { localStorage.setItem('chat_history', chatBox.innerHTML); }
        function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }
        function clearChat() { if(confirm("Hapus semua chat?")) { chatBox.innerHTML = ''; localStorage.removeItem('chat_history'); } }
    </script>
</body>
</html>
